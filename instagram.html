<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our important social media & Resources | </title>

    <meta name="description" content="Browse our collection of helpful business funding and finance resources.">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial,Helvetica,sans-serif;
            background:#f5f7fa;
            color:#333;
            line-height:1.6;
        }

        .container{
            width:90%;
            max-width:900px;
            margin:50px auto;
        }

        h1{
            margin-bottom:10px;
            color:#222;
        }

        p{
            margin-bottom:30px;
            color:#666;
        }

        .resource-list{
            list-style:none;
        }

        .resource-item{
            background:#fff;
            margin-bottom:15px;
            border-radius:8px;
            padding:18px 22px;
            box-shadow:0 2px 8px rgba(0,0,0,.08);
            transition:.2s;
        }

        .resource-item:hover{
            transform:translateY(-2px);
            box-shadow:0 5px 15px rgba(0,0,0,.12);
        }

        .resource-item a{
            text-decoration:none;
            color:#0066cc;
            font-size:18px;
            font-weight:bold;
        }

        .resource-item a:hover{
            text-decoration:underline;
        }

        footer{
            margin-top:50px;
            text-align:center;
            color:#888;
            font-size:14px;
        }

</head>

    <h1>Resources</h1>

    <p>
